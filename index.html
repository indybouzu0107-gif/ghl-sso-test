<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GHL SSO Test</title>
</head>
<body>
<h1>GHL Custom Page SSO Test</h1>
<p>Status: <span id="status">waiting for parent...</span></p>
<pre id="output" style="white-space:pre-wrap;word-break:break-all;background:#f0f0f0;padding:10px;"></pre>
<script>
function log(msg) {
  document.getElementById('output').textContent += msg + '\n\n';
}

window.addEventListener('message', function(event) {
  log('Received message from origin: ' + event.origin);
  log('Raw event.data: ' + JSON.stringify(event.data));
  if (event.data && event.data.message === 'REQUEST_USER_DATA_RESPONSE') {
    document.getElementById('status').textContent = 'received encrypted payload';
    log('Encrypted payload (copy this): ' + event.data.payload);
  }
});

try {
  window.parent.postMessage({ message: 'REQUEST_USER_DATA' }, '*');
  log('Sent REQUEST_USER_DATA to parent window.');
} catch (e) {
  log('Error posting message: ' + e.message);
}

if (window.exposeSessionDetails) {
  log('window.exposeSessionDetails is available.');
} else {
  log('window.exposeSessionDetails is NOT available on this page.');
}
</script>
</body>
</html>
